<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
<meta charset="UTF-8"/>
<title>Yeni Sipariş Alındı</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f5f5f5; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; }
.wrapper { max-width:600px; margin:0 auto; padding:24px 16px; }
.card { background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
.header { background:linear-gradient(135deg,#1e293b,#334155); padding:24px 32px; }
.header-title { color:#fff; font-size:18px; font-weight:800; margin-top:6px; }
.header-sub { color:rgba(255,255,255,0.7); font-size:12px; margin-top:3px; }
.body { padding:24px 32px; }
.alert { background:#dcfce7; border:1px solid #86efac; border-radius:10px; padding:12px 16px; margin-bottom:20px; font-size:14px; font-weight:700; color:#15803d; }
.order-box { background:#f9f9f9; border:1px solid #eee; border-radius:12px; padding:14px 20px; margin:16px 0; }
.order-row { display:flex; justify-content:space-between; font-size:13px; padding:6px 0; border-bottom:1px solid #eee; }
.order-row:last-child { border-bottom:none; }
.order-label { color:#888; }
.order-value { font-weight:600; color:#1a1a1a; }
.amount { font-size:22px; font-weight:800; color:#F4821F; }
.items-table { width:100%; border-collapse:collapse; margin:12px 0; font-size:13px; }
.items-table th { text-align:left; padding:7px 10px; background:#f5f5f5; color:#666; }
.items-table td { padding:7px 10px; border-bottom:1px solid #f5f5f5; }
.btn { display:inline-block; background:#1e293b; color:#fff!important; text-decoration:none; padding:10px 24px; border-radius:8px; font-weight:700; font-size:13px; margin:16px 0; }
.footer { padding:16px 32px; text-align:center; font-size:11px; color:#aaa; border-top:1px solid #f0f0f0; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="card">
    <div class="header">
      <div style="font-size:24px;">🔔</div>
      <div class="header-title">Yeni Sipariş Alındı!</div>
      <div class="header-sub" th:text="'baskiurunleri.com — ' + ${orderDate}"></div>
    </div>
    <div class="body">
      <div class="alert">
        💰 Yeni sipariş: <span th:text="${orderNumber}"></span> — <span th:text="'₺' + ${totalTl}"></span>
      </div>

      <div class="order-box">
        <div class="order-row">
          <span class="order-label">Sipariş No</span>
          <span class="order-value" th:text="${orderNumber}"></span>
        </div>
        <div class="order-row">
          <span class="order-label">Müşteri</span>
          <span class="order-value" th:text="${customerName}"></span>
        </div>
        <div class="order-row" th:if="${customerPhone}">
          <span class="order-label">Telefon</span>
          <span class="order-value" th:text="${customerPhone}"></span>
        </div>
        <div class="order-row" th:if="${customerEmail}">
          <span class="order-label">E-posta</span>
          <span class="order-value" th:text="${customerEmail}"></span>
        </div>
        <div class="order-row" th:if="${address}">
          <span class="order-label">Adres</span>
          <span class="order-value" th:text="${address}"></span>
        </div>
        <div class="order-row" th:if="${notes}">
          <span class="order-label">Not</span>
          <span class="order-value" th:text="${notes}"></span>
        </div>
      </div>

      <table class="items-table" th:if="${items != null and !items.isEmpty()}">
        <thead>
          <tr>
            <th>Ürün</th>
            <th style="text-align:right;">Adet</th>
            <th style="text-align:right;">Tutar</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="item : ${items}">
            <td th:text="${item.productName}"></td>
            <td style="text-align:right;" th:text="${item.tierQty}"></td>
            <td style="text-align:right; font-weight:600;" th:text="'₺' + ${#numbers.formatDecimal(item.priceTl, 0, 'POINT', 0, 'COMMA')}"></td>
          </tr>
        </tbody>
      </table>

      <div style="text-align:right; font-size:18px; font-weight:800; color:#F4821F; margin:8px 0;">
        Toplam: <span th:text="'₺' + ${totalTl}"></span>
      </div>

      <div style="text-align:center;">
        <a th:href="${adminUrl}" class="btn">⚡ Admin Panelinde Görüntüle</a>
      </div>
    </div>
    <div class="footer">
      <p>baskiurunleri.com Admin Bildirimi</p>
    </div>
  </div>
</div>
</body>
</html>
