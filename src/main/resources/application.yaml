  header: ${NETGSM_HEADER:BASKISIST}

sentry:
  dsn: https://a78566bca3eb5308a89051775d830f01@o4511417135726593.ingest.de.sentry.io/4511417150799952
  environment: ${SENTRY_ENV:development}
  traces-sample-rate: 1.0
