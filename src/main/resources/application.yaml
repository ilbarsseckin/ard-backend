spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/baski_db
    username: baski_user
    password: ${DB_PASS:baski_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

  # ─── Gmail SMTP ───
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-gmail@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp

logging:
  level:
    org:
      springframework:
        web: DEBUG

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:baski-gizli-anahtar-buraya-uzun-bir-deger-yazin-32-karakter}
  expiration: 86400000

r2:
  endpoint: ${R2_ENDPOINT:https://YOUR_ACCOUNT_ID.r2.cloudflarestorage.com}
  access-key: ${R2_ACCESS_KEY:your-access-key}
  secret-key: ${R2_SECRET_KEY:your-secret-key}
  bucket: ${R2_BUCKET:baski-dosyalari}
  presigned-url-expiry: 900

iyzico:
  api-key: ${IYZICO_API_KEY:sandbox-placeholder}
  secret-key: ${IYZICO_SECRET_KEY:sandbox-placeholder}
