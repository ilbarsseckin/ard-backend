services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: baski_db
      POSTGRES_USER: baski_user
      POSTGRES_PASSWORD: baski_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
