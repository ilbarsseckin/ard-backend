events {
    worker_connections 1024;
}

http {
    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Upload limit (R2'ye dosya yükleme için)
    client_max_body_size 110M;

    # ── HTTP → HTTPS yönlendirme ──────────────────────────────────
    server {
        listen 80;
        server_name baskiurunleri.com www.baskiurunleri.com api.baskiurunleri.com;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Frontend (baskiurunleri.com) ──────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name baskiurunleri.com www.baskiurunleri.com;

        ssl_certificate     /etc/letsencrypt/live/baskiurunleri.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/baskiurunleri.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Next.js static assets — agresif cache
        location /_next/static/ {
            proxy_pass http://frontend:3001;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            proxy_pass http://frontend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── Backend API (api.baskiurunleri.com) ──────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name api.baskiurunleri.com;

        ssl_certificate     /etc/letsencrypt/live/baskiurunleri.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/baskiurunleri.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Büyük dosya yükleme için timeout artır
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
